services:
  # ---------------------------------------------------------------------------
  # Authentik Proxy Outpost — Forward Auth for SSO
  # ---------------------------------------------------------------------------
  authentik-proxy:
    image: ghcr.io/goauthentik/proxy:2025.2
    container_name: sdlc-authentik-proxy
    restart: unless-stopped
    environment:
      AUTHENTIK_HOST: https://auth.aymenmastouri.io
      AUTHENTIK_INSECURE: "false"
      AUTHENTIK_TOKEN: ${AUTHENTIK_OUTPOST_TOKEN}
    networks:
      - sdlc_internal
      - traefik_proxy
    mem_limit: 256m
    mem_reservation: 64m
    labels:
      - "traefik.enable=true"
      # Outpost handles /outpost.goauthentik.io/ on the protected domain
      - "traefik.http.routers.sdlc-outpost.rule=Host(`sdlc.aymenmastouri.io`) && PathPrefix(`/outpost.goauthentik.io/`)"
      - "traefik.http.routers.sdlc-outpost.entrypoints=websecure"
      - "traefik.http.routers.sdlc-outpost.tls.certresolver=letsencrypt"
      - "traefik.http.services.sdlc-outpost.loadbalancer.server.port=9000"
      # Forward Auth middleware definition
      - "traefik.http.middlewares.sdlc-auth.forwardauth.address=http://sdlc-authentik-proxy:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.sdlc-auth.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.sdlc-auth.forwardauth.authResponseHeaders=X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # SDLC Pilot Backend — FastAPI
  # ---------------------------------------------------------------------------
  backend:
    image: sdlc-pilot/backend:latest
    container_name: sdlc-backend
    restart: unless-stopped
    env_file: .env
    environment:
      AICODEGENCREW_ROOT: /app
      PROJECT_PATH: /project
      DASHBOARD_HOST: "0.0.0.0"
      DASHBOARD_PORT: "8001"
      DASHBOARD_CORS_ORIGINS: "https://sdlc.aymenmastouri.io"
    volumes:
      - ${PROJECT_PATH:-.}:/project:ro
      - sdlc_knowledge:/app/knowledge
      - sdlc_architecture_docs:/app/architecture-docs
      - sdlc_inputs:/app/inputs
      - ./config/phases_config.yaml:/app/config/phases_config.yaml:ro
    networks:
      - sdlc_internal
      - traefik_proxy
      - ai_lab_backend
    mem_limit: 2g
    mem_reservation: 512m
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sdlc-api.rule=Host(`sdlc-api.aymenmastouri.io`)"
      - "traefik.http.routers.sdlc-api.entrypoints=websecure"
      - "traefik.http.routers.sdlc-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.sdlc-api.middlewares=sdlc-auth@docker"
      - "traefik.http.services.sdlc-api.loadbalancer.server.port=8001"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # SDLC Pilot Frontend — Angular via nginx
  # ---------------------------------------------------------------------------
  frontend:
    image: sdlc-pilot/frontend:latest
    container_name: sdlc-frontend
    restart: unless-stopped
    networks:
      - sdlc_internal
      - traefik_proxy
    mem_limit: 128m
    mem_reservation: 32m
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sdlc.rule=Host(`sdlc.aymenmastouri.io`)"
      - "traefik.http.routers.sdlc.entrypoints=websecure"
      - "traefik.http.routers.sdlc.tls.certresolver=letsencrypt"
      - "traefik.http.routers.sdlc.middlewares=sdlc-auth@docker"
      - "traefik.http.services.sdlc.loadbalancer.server.port=80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Langfuse — LLM Observability (prompt tracing, cost tracking)
  # ---------------------------------------------------------------------------
  langfuse-db:
    image: postgres:16-alpine
    container_name: sdlc-langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_DB: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD}
    volumes:
      - sdlc_langfuse_db:/var/lib/postgresql/data
    networks:
      - sdlc_internal
    mem_limit: 256m
    mem_reservation: 64m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  langfuse:
    image: langfuse/langfuse:2
    container_name: sdlc-langfuse
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD}@langfuse-db:5432/langfuse
      NEXTAUTH_URL: https://langfuse.aymenmastouri.io
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
    networks:
      - sdlc_internal
      - traefik_proxy
    mem_limit: 512m
    mem_reservation: 128m
    depends_on:
      langfuse-db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.langfuse.rule=Host(`langfuse.aymenmastouri.io`)"
      - "traefik.http.routers.langfuse.entrypoints=websecure"
      - "traefik.http.routers.langfuse.tls.certresolver=letsencrypt"
      - "traefik.http.services.langfuse.loadbalancer.server.port=3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # MLflow — Experiment Tracking (pipeline metrics, knowledge versioning)
  # ---------------------------------------------------------------------------
  mlflow-db:
    image: postgres:16-alpine
    container_name: sdlc-mlflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_DB: mlflow
      POSTGRES_PASSWORD: ${MLFLOW_DB_PASSWORD}
    volumes:
      - sdlc_mlflow_db:/var/lib/postgresql/data
    networks:
      - sdlc_internal
    mem_limit: 256m
    mem_reservation: 64m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: sdlc-mlflow
    restart: unless-stopped
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://mlflow:${MLFLOW_DB_PASSWORD}@mlflow-db:5432/mlflow --default-artifact-root /mlflow/artifacts --allowed-hosts mlflow.aymenmastouri.io,sdlc-mlflow
    volumes:
      - sdlc_mlflow_artifacts:/mlflow/artifacts
    networks:
      - sdlc_internal
      - traefik_proxy
    mem_limit: 1g
    mem_reservation: 256m
    depends_on:
      mlflow-db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mlflow.rule=Host(`mlflow.aymenmastouri.io`)"
      - "traefik.http.routers.mlflow.entrypoints=websecure"
      - "traefik.http.routers.mlflow.tls.certresolver=letsencrypt"
      - "traefik.http.services.mlflow.loadbalancer.server.port=5000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# =============================================================================
# Volumes
# =============================================================================
volumes:
  sdlc_knowledge:
  sdlc_architecture_docs:
  sdlc_inputs:
  sdlc_langfuse_db:
  sdlc_mlflow_db:
  sdlc_mlflow_artifacts:

# =============================================================================
# Networks
# =============================================================================
networks:
  sdlc_internal:
    driver: bridge
  traefik_proxy:
    external: true
  ai_lab_backend:
    external: true
