# =============================================================================
# Phase 2: Architecture Analysis Crew - 17 Focused Tasks
# =============================================================================
# Each task is INDEPENDENT and runs async without context from others.
# All tasks use tools to query facts - no hardcoded assumptions.
# Synthesis task reads all partial outputs from files.
# =============================================================================

# =============================================================================
# TECH ARCHITECT TASKS (1.1 - 1.4)
# =============================================================================

analyze_macro_architecture:
  description: >
    Analyze MACRO ARCHITECTURE style.
    
    STEPS:
    1. Call: get_facts_statistics() to understand scale
    2. Call: list_components_by_stereotype(stereotype="architecture_style")
    3. Call: query_facts(category="containers")
    4. Determine: Monolith, Modular Monolith, Microservices, or Hybrid?
    
    INDICATORS:
    - 1 container = Monolith
    - 1 container + clear modules = Modular Monolith
    - Multiple containers with APIs = Microservices
    
  expected_output: >
    JSON with: style, container_count, reasoning, scalability_approach, 
    deployment_model, communication_pattern
  agent: tech_architect

analyze_backend_pattern:
  description: >
    Analyze BACKEND architectural pattern.
    
    STEPS:
    1. Call: get_facts_statistics() - check components_by_stereotype
    2. Call: list_components_by_stereotype(stereotype="controller", limit=50)
    3. Call: list_components_by_stereotype(stereotype="service", limit=50)
    4. Call: list_components_by_stereotype(stereotype="repository", limit=50)
    5. Determine pattern from layer distribution
    
    PATTERNS:
    - Layered: controller → service → repository clear separation
    - Hexagonal: ports/adapters naming, domain isolation
    - Clean Architecture: use cases, entities, interfaces folders
    - CQRS: separate command/query handlers
    
  expected_output: >
    JSON with: primary_pattern, layer_structure, component_counts, 
    technology (framework, language), reasoning
  agent: tech_architect

analyze_frontend_pattern:
  description: >
    Analyze FRONTEND architectural pattern.
    
    STEPS:
    1. Call: query_facts(category="containers") - find frontend container
    2. Call: list_components_by_stereotype(stereotype="component", limit=50)
    3. Check container metadata for framework
    
    PATTERNS:
    - Component-Based SPA: Angular/React/Vue components
    - Micro-Frontends: multiple independent frontend apps
    - Server-Rendered: minimal JS, server templates
    
  expected_output: >
    JSON with: primary_pattern, framework, module_structure, 
    state_management, routing_strategy, component_count, reasoning
  agent: tech_architect

analyze_architecture_quality:
  description: >
    Assess ARCHITECTURE QUALITY metrics.
    
    STEPS:
    1. Call: get_facts_statistics() - get relation counts
    2. Call: query_facts(category="relations", limit=100)
    3. Check for layer violations (controller → repository direct)
    4. Calculate coupling metrics
    
    METRICS:
    - Separation of concerns: good/moderate/poor
    - Layer violations count
    - Coupling assessment: loose/moderate/tight
    - Circular dependencies count
    
  expected_output: >
    JSON with: separation_of_concerns, layer_violations_count, 
    coupling_assessment, circular_dependencies, overall_grade, reasoning
  agent: tech_architect

# =============================================================================
# FUNCTIONAL ANALYST TASKS (2.1 - 2.8)
# =============================================================================

analyze_domain_model:
  description: >
    Analyze the DOMAIN MODEL.
    
    STEPS:
    1. Call: get_facts_statistics() - check entity count
    2. Call: list_components_by_stereotype(stereotype="entity", limit=100)
    3. Group entities by naming prefix (domain areas)
    4. Identify core vs supporting domains
    
    OUTPUT:
    - List ALL entity names
    - Group by domain area
    - Identify domain complexity
    
  expected_output: >
    JSON with: total_entities, domain_complexity, core_domain_areas,
    naming_consistency, reasoning
  agent: func_analyst

analyze_business_capabilities:
  description: >
    Identify BUSINESS CAPABILITIES from services.
    
    STEPS:
    1. Call: list_components_by_stereotype(stereotype="service", limit=100)
    2. Group services by naming prefix
    3. Each prefix group = one capability
    4. Assess capability maturity
    
    EXAMPLE:
    - OrderService, OrderValidationService → "Order Management" capability
    - UserService, AuthService → "User Management" capability
    
  expected_output: >
    JSON with: capabilities list (name, services, description, maturity),
    capability_coverage, reasoning
  agent: func_analyst

analyze_bounded_contexts:
  description: >
    Identify BOUNDED CONTEXTS (DDD).
    
    STEPS:
    1. Call: get_facts_statistics() - understand scale
    2. Call: list_components_by_stereotype(stereotype="entity", limit=50)
    3. Call: list_components_by_stereotype(stereotype="service", limit=50)
    4. Cross-reference: entities + services with same prefix = context
    
    CONTEXT DETECTION:
    - Components with same prefix belong to same context
    - Check cross-context dependencies via relations
    
  expected_output: >
    JSON with: contexts_identified, contexts list (name, entities, services),
    cross_context_coupling, recommendations, reasoning
  agent: func_analyst

analyze_state_machines:
  description: >
    Detect STATE MACHINES in the codebase.
    
    STEPS:
    1. Call: rag_query("state machine StateMachine")
    2. Call: rag_query("status enum Status")
    3. Call: list_components_by_stereotype(stereotype="entity", limit=50)
    4. Look for entities with status/state fields
    
    INDICATORS:
    - Spring State Machine annotations
    - Enum with states (PENDING, APPROVED, REJECTED)
    - State transition methods
    
  expected_output: >
    JSON with: detected (bool), implementation type, stateful_entities,
    state_machine_classes, reasoning
  agent: func_analyst

analyze_workflow_engines:
  description: >
    Detect WORKFLOW ENGINES (BPMN, Camunda, Flowable).
    
    STEPS:
    1. Call: rag_query("Camunda BPMN workflow")
    2. Call: rag_query("Flowable Activiti process")
    3. Call: list_components_by_stereotype(stereotype="design_pattern")
    4. Check for workflow-related patterns
    
    INDICATORS:
    - Camunda/Flowable dependencies
    - .bpmn files
    - ProcessEngine beans
    
  expected_output: >
    JSON with: engine (Camunda/Flowable/None), version, bpmn_processes,
    integration_style, workflow_services, reasoning
  agent: func_analyst

analyze_saga_patterns:
  description: >
    Detect SAGA patterns for distributed transactions.
    
    STEPS:
    1. Call: rag_query("saga pattern compensation")
    2. Call: rag_query("outbox pattern event")
    3. Call: list_components_by_stereotype(stereotype="design_pattern")
    
    INDICATORS:
    - Saga orchestrators
    - Compensation methods
    - Outbox tables
    - Event sourcing
    
  expected_output: >
    JSON with: detected (bool), style (orchestration/choreography),
    sagas list, outbox_pattern (bool), event_store, reasoning
  agent: func_analyst

analyze_runtime_scenarios:
  description: >
    Identify key RUNTIME SCENARIOS (Arc42 Section 6).
    
    STEPS:
    1. Call: list_components_by_stereotype(stereotype="controller", limit=30)
    2. Call: query_facts(category="interfaces", limit=30)
    3. For top 3-5 endpoints, trace the flow
    
    SCENARIO FORMAT:
    - Trigger: HTTP request
    - Steps: controller → service → repository
    - End state: response returned
    
  expected_output: >
    JSON with: scenarios list (name, trigger, steps, end_state),
    orchestration_style, arc42_section6_ready, reasoning
  agent: func_analyst

analyze_api_design:
  description: >
    Assess API DESIGN QUALITY.
    
    STEPS:
    1. Call: get_facts_statistics() - check api_statistics section
    2. Analyze verb distribution (GET, POST, PUT, DELETE)
    3. Check versioning (/v1/, /v2/)
    4. Assess naming consistency
    
    METRICS:
    - RESTfulness: proper verbs, resource URLs
    - Consistency: same patterns across controllers
    - Versioning strategy
    
  expected_output: >
    JSON with: total_endpoints, restfulness, verb_distribution,
    consistency, versioning_strategy, naming_quality, recommendations, reasoning
  agent: func_analyst

# =============================================================================
# QUALITY ANALYST TASKS (3.1 - 3.4)
# =============================================================================

analyze_complexity:
  description: >
    Assess STRUCTURAL and COGNITIVE COMPLEXITY.
    
    STEPS:
    1. Call: get_facts_statistics()
    2. Calculate: relations per component ratio
    3. Identify complexity hotspots
    
    THRESHOLDS:
    - < 500 components: Low complexity
    - 500-5000: Medium
    - 5000+: High/Enterprise
    
  expected_output: >
    JSON with: total_components, total_relations, relations_per_component,
    structural_complexity, cognitive_complexity, scale, hotspots, reasoning
  agent: quality_analyst

analyze_technical_debt:
  description: >
    Assess TECHNICAL DEBT level.
    
    STEPS:
    1. Call: rag_query("TODO FIXME deprecated")
    2. Call: rag_query("workaround hack temporary")
    3. Call: get_facts_statistics()
    4. Estimate debt from code indicators
    
    INDICATORS:
    - TODO/FIXME count
    - Deprecated annotations
    - Workaround comments
    
  expected_output: >
    JSON with: debt_level, indicators_found, categories,
    estimated_effort, priority_items, reasoning
  agent: quality_analyst

analyze_security:
  description: >
    Assess SECURITY POSTURE.
    
    STEPS:
    1. Call: rag_query("Spring Security authentication")
    2. Call: rag_query("JWT OAuth authorization")
    3. Call: rag_query("@PreAuthorize @Secured")
    4. Check for security patterns
    
    CHECKLIST:
    - Authentication mechanism
    - Authorization framework
    - Input validation
    - Audit logging
    
  expected_output: >
    JSON with: authentication, authorization, input_validation,
    audit_logging, security_framework, concerns, recommendations,
    overall_posture, reasoning
  agent: quality_analyst

analyze_operational_readiness:
  description: >
    Assess OPERATIONAL READINESS.
    
    STEPS:
    1. Call: rag_query("actuator health metrics")
    2. Call: rag_query("logging slf4j logback")
    3. Call: rag_query("@ConfigurationProperties")
    4. Check for ops patterns
    
    CHECKLIST:
    - Health checks (Spring Actuator)
    - Monitoring endpoints
    - Structured logging
    - Configuration externalization
    
  expected_output: >
    JSON with: health_checks, monitoring, logging, metrics,
    configuration, deployment_readiness, recommendations, reasoning
  agent: quality_analyst

# =============================================================================
# SYNTHESIS TASK (4.0)
# =============================================================================

synthesize_architecture:
  description: >
    Synthesize ALL analysis results into analyzed_architecture.json.
    
    STEPS:
    1. Call: read_partial_results() to get all analysis outputs
    2. Merge all sections into complete architecture document
    3. Calculate overall grade
    4. Write executive summary
    5. Create top recommendations
    
    STRUCTURE:
    - system: name, description
    - macro_architecture: from task 1.1
    - micro_architecture: backend (1.2) + frontend (1.3)
    - architecture_quality: from task 1.4
    - domain: model (2.1) + capabilities (2.2) + contexts (2.3)
    - workflows: state machines (2.4) + engines (2.5) + sagas (2.6) + scenarios (2.7)
    - api: from task 2.8
    - quality: complexity (3.1) + debt (3.2) + security (3.3) + ops (3.4)
    
  expected_output: >
    Complete analyzed_architecture.json matching AnalyzedArchitecture schema.
    All sections populated from partial results.
    Overall grade (A-F) and executive summary.
  agent: synthesis_lead
