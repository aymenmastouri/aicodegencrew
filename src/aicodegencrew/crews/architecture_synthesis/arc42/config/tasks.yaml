# =============================================================================
# Arc42 Crew - Task Definitions (Phase 3) - SUBTASK STRUCTURE
# =============================================================================
# TARGET: ~100 pages professional documentation
#
# STRUCTURE: Each major section is a subtask, merged at the end
#
# DATA SOURCES (used by all subtasks):
#   - analyzed_architecture.json: Style, patterns, quality (Phase 2)
#   - architecture_facts.json: Components, relations, containers (Phase 1)
# =============================================================================

# =============================================================================
# ANALYZE SYSTEM - Split into subtasks
# =============================================================================

analyze_system_datasources:
  description: |
    Load and validate the data sources for Arc42 documentation.
    
    ## DATA SOURCES
    1. analyzed_architecture.json: Style, patterns, quality (Phase 2)
    2. architecture_facts.json: Components, relations, containers (Phase 1)
    
    ## TASK
    - Query and validate both JSON files exist
    - Extract system name, type, technology stack
    - Create summary of available data
    
    ## DELIVERABLE
    Summary of available data sources and their contents.
  expected_output: "Data sources summary"
  agent: arc42_architect

analyze_system_identity:
  description: |
    Analyze System Identity (2-3 pages worth of content).
    
    ## DATA SOURCES
    1. analyzed_architecture.json: Style, patterns, quality (Phase 2)
    2. architecture_facts.json: Components, relations, containers (Phase 1)
    
    ## ANALYSIS REQUIRED
    - Full system name and purpose
    - Business domain classification (Core/Supporting/Generic subdomain per DDD)
    - Target user personas with their goals
    - Business value proposition and key success factors
    - System scope: what's IN scope, what's OUT of scope
    
    ## DELIVERABLE
    Structured analysis of system identity.
  expected_output: "System identity analysis (2-3 pages)"
  agent: arc42_architect
  context: []

analyze_system_architecture:
  description: |
    Architecture Deep Dive (5+ pages worth of content).
    
    ## DATA SOURCES
    1. analyzed_architecture.json: Style, patterns, quality (Phase 2)
    2. architecture_facts.json: Components, relations, containers (Phase 1)
    
    ## ANALYSIS REQUIRED
    - Primary architectural style with RATIONALE
    - A-Architecture (Application/Business): Functional decomposition
    - T-Architecture (Technical): Technical building blocks
    - Layer structure with clear responsibilities per layer
    - Applied patterns with WHY each pattern was chosen
    - Bounded Contexts identified (DDD strategic design)
    
    ## DELIVERABLE
    Comprehensive architecture analysis.
  expected_output: "Architecture deep dive (5+ pages)"
  agent: arc42_architect
  context: []

analyze_system_technology:
  description: |
    Technology Stack Analysis (3+ pages worth of content).
    
    ## DATA SOURCES
    1. analyzed_architecture.json: Style, patterns, quality (Phase 2)
    2. architecture_facts.json: Components, relations, containers (Phase 1)
    
    Query facts for exact versions and libraries.
    
    ## ANALYSIS REQUIRED
    - Backend: Framework version, key dependencies, build tools
    - Frontend: Framework, UI component library, state management
    - Database: Type, ORM, migration strategy, connection pooling
    - Infrastructure: Container runtime, orchestration, service mesh
    - Security: Authentication, authorization, encryption
    - Observability: Logging, metrics, tracing frameworks
    
    ## DELIVERABLE
    Complete technology stack analysis with versions.
  expected_output: "Technology stack analysis (3+ pages)"
  agent: arc42_architect
  context: []

analyze_system_components:
  description: |
    Component Inventory (5+ pages worth of content).
    
    ## DATA SOURCES
    1. analyzed_architecture.json: Style, patterns, quality (Phase 2)
    2. architecture_facts.json: Components, relations, containers (Phase 1)
    
    Use list_components_by_stereotype for COMPLETE lists.
    
    ## ANALYSIS REQUIRED
    - Controllers: Full list with endpoints, HTTP methods, request/response types
    - Services: Full list with business capabilities, dependencies
    - Repositories: Full list with managed entities, query patterns
    - Entities: Full list with relationships, validations
    - DTOs: Transformation patterns, mapping strategies
    - Configuration: Property sources, profiles, feature flags
    
    ## DELIVERABLE
    Complete component inventory with counts and details.
  expected_output: "Component inventory (5+ pages)"
  agent: arc42_architect
  context: []

analyze_system_dependencies:
  description: |
    Dependency Analysis (3+ pages worth of content).
    
    ## DATA SOURCES
    1. analyzed_architecture.json: Style, patterns, quality (Phase 2)
    2. architecture_facts.json: Components, relations, containers (Phase 1)
    
    ## ANALYSIS REQUIRED
    - Internal layer dependencies (document any layer violations)
    - External library dependencies with versions
    - Service dependencies (sync/async)
    - Database dependencies
    - Circular dependency detection results
    - Coupling analysis per module
    
    ## DELIVERABLE
    Comprehensive dependency analysis.
  expected_output: "Dependency analysis (3+ pages)"
  agent: arc42_architect
  context: []

analyze_system_integration:
  description: |
    Integration Points Analysis (3+ pages worth of content).
    
    ## DATA SOURCES
    1. analyzed_architecture.json: Style, patterns, quality (Phase 2)
    2. architecture_facts.json: Components, relations, containers (Phase 1)
    
    ## ANALYSIS REQUIRED
    - REST APIs exposed (endpoints, methods, formats)
    - REST APIs consumed (external services)
    - Message queues (topics, event types)
    - Database connections
    - File system interactions
    - Scheduled jobs/batch processing
    
    ## DELIVERABLE
    Complete integration points documentation.
  expected_output: "Integration points (3+ pages)"
  agent: arc42_architect
  context: []

analyze_system_quality:
  description: |
    Quality Assessment (2+ pages worth of content).
    
    ## DATA SOURCES
    1. analyzed_architecture.json: Style, patterns, quality (Phase 2)
    2. architecture_facts.json: Components, relations, containers (Phase 1)
    
    ## ANALYSIS REQUIRED
    - Maintainability: Code organization, separation of concerns
    - Testability: Test patterns, coverage indicators
    - Security: Authentication, authorization, input validation
    - Performance: Caching, async processing, connection pooling
    - Scalability: Stateless design, horizontal scaling patterns
    
    ## DELIVERABLE
    Quality assessment with ratings.
  expected_output: "Quality assessment (2+ pages)"
  agent: arc42_architect
  context: []

analyze_system_risks:
  description: |
    Risk Inventory (2+ pages worth of content).
    
    ## DATA SOURCES
    1. analyzed_architecture.json: Style, patterns, quality (Phase 2)
    2. architecture_facts.json: Components, relations, containers (Phase 1)
    
    ## ANALYSIS REQUIRED
    - Architectural risks with severity (High/Medium/Low)
    - Technical debt items with impact
    - Missing patterns and their consequences
    - Single points of failure
    - Mitigation strategies for each risk
    
    ## DELIVERABLE
    Complete risk inventory with mitigations.
  expected_output: "Risk inventory (2+ pages)"
  agent: arc42_architect
  context: []

# =============================================================================
# CHAPTER 1: INTRODUCTION - Split into subtasks
# =============================================================================

intro_requirements:
  description: |
    Create Introduction Section 1.1: Requirements Overview (3-4 pages).
    
    ## DATA SOURCES
    1. analyzed_architecture.json: Style, patterns, quality (Phase 2)
    2. architecture_facts.json: Components, relations, containers (Phase 1)
    
    {system_summary}
    
    ## DELIVERABLE: parts/01-intro-requirements.md
    
    ## 1.1 Requirements Overview
    
    ### 1.1.1 What is this System?
    - Full system description (not just one sentence!)
    - Business domain and subdomain classification
    - Primary business value delivered
    - Key differentiators from similar systems
    
    ### 1.1.2 Essential Features
    Document the TOP 10 business capabilities with:
    - Feature name
    - Business value
    - Key components involved
    - User story example
    
    ### 1.1.3 System Statistics
    Create a table with:
    | Metric | Count |
    |--------|-------|
    | Total Components | X |
    | Controllers | X |
    | Services | X |
    | Repositories | X |
    | Entities | X |
    | REST Endpoints | X |
    | Database Tables | X |
  expected_output: "Requirements overview section (3-4 pages)"
  agent: arc42_architect
  context: []
  output_file: "knowledge/architecture/arc42/parts/01-intro-requirements.md"

intro_quality_goals:
  description: |
    Create Introduction Section 1.2: Quality Goals (2-3 pages).
    
    ## DATA SOURCES
    1. analyzed_architecture.json: Style, patterns, quality (Phase 2)
    2. architecture_facts.json: Components, relations, containers (Phase 1)
    
    {system_summary}
    
    ## DELIVERABLE: parts/01-intro-quality-goals.md
    
    ## 1.2 Quality Goals
    
    Derive from architecture analysis. For EACH quality goal:
    
    ### Quality Goal Template:
    | Attribute | Description |
    |-----------|-------------|
    | Goal | e.g., Maintainability |
    | Priority | 1-3 |
    | Rationale | Why is this important? |
    | How Achieved | Which patterns support this? |
    | Measurement | How do we verify? |
    
    Document at least 5 quality goals:
    1. Maintainability
    2. Testability
    3. Security
    4. Performance
    5. Scalability
  expected_output: "Quality goals section (2-3 pages)"
  agent: arc42_architect
  context: []
  output_file: "knowledge/architecture/arc42/parts/01-intro-quality-goals.md"

intro_stakeholders:
  description: |
    Create Introduction Section 1.3: Stakeholders (2-3 pages).
    
    ## DATA SOURCES
    1. analyzed_architecture.json: Style, patterns, quality (Phase 2)
    2. architecture_facts.json: Components, relations, containers (Phase 1)
    
    {system_summary}
    
    ## DELIVERABLE: parts/01-intro-stakeholders.md
    
    ## 1.3 Stakeholders
    
    Create a comprehensive stakeholder table:
    
    | Role | Concern | Expectations | Contact |
    |------|---------|--------------|---------|
    | Product Owner | Feature delivery | Regular releases | - |
    | Developer | Code quality | Clean architecture | - |
    | Operations | Stability | Monitoring, alerts | - |
    | Security Officer | Compliance | Security scans | - |
    | End User | Usability | Responsive UI | - |
    | Database Admin | Data integrity | Backup, recovery | - |
    
    Include at least 8 stakeholder roles with detailed concerns.
  expected_output: "Stakeholders section (2-3 pages)"
  agent: arc42_architect
  context: []
  output_file: "knowledge/architecture/arc42/parts/01-intro-stakeholders.md"

intro_merge:
  description: |
    MERGE all Introduction sections into Chapter 1 (8-10 pages total).
    
    ## DATA SOURCES
    1. analyzed_architecture.json: Style, patterns, quality (Phase 2)
    2. architecture_facts.json: Components, relations, containers (Phase 1)
    
    READ these files using safe_file_read:
    1. knowledge/architecture/arc42/parts/01-intro-requirements.md
    2. knowledge/architecture/arc42/parts/01-intro-quality-goals.md
    3. knowledge/architecture/arc42/parts/01-intro-stakeholders.md
    
    COMBINE into one complete document.
    
    ## DELIVERABLE: 01-introduction.md
    
    # 01 - Introduction and Goals
    
    [Merged content from all parts]
  expected_output: "Complete arc42 Introduction chapter (8-10 pages)"
  agent: arc42_architect
  context: []
  output_file: "knowledge/architecture/arc42/01-introduction.md"

