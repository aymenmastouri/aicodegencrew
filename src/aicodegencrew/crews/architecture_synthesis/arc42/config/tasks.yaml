# =============================================================================
# Arc42 Crew - Task Definitions (Phase 3)
# =============================================================================
# INPUT:
#   - architecture_facts.json (Phase 1): Exact component names, relations
#   - analyzed_architecture.json (Phase 2): Architecture style, patterns, quality
# OUTPUT:
#   - arc42/01-introduction.md ... 12-glossary.md
# =============================================================================

# -----------------------------------------------------------------------------
# PHASE 1: ANALYSIS (Use analyzed.json + query facts for details)
# -----------------------------------------------------------------------------

analyze_system:
  description: |
    YOU are the Software Architect. Create arc42 analysis from Phase 2 output + facts!
    
    DATA SOURCES:
    - analyzed_architecture.json: Already contains style, patterns, quality, risks
    - architecture_facts.json: Query for specific component details
    
    ## STEP 1: Read Architecture Analysis
    The analyzed_architecture.json already contains:
    - system.name, system.domain, system.description
    - architecture.primary_style, architecture.layers
    - patterns[] with names and counts
    - technology.backend/frontend/database
    - capabilities[] with key_components
    - quality_attributes.maintainability/scalability/etc
    - risks[] with severity and mitigation
    
    ## STEP 2: Query Facts for Specific Details
    Use tools to get EXACT data when needed:
    - query_architecture_facts(category="containers") → deployment units
    - query_architecture_facts(category="relations") → dependencies
    - list_components_by_stereotype for component lists
    
    ## YOUR ANALYSIS must combine:
    1. HIGH-LEVEL CONTEXT from analyzed_architecture.json
    2. SPECIFIC DETAILS from architecture_facts.json
    3. QUALITY/RISKS from analyzed_architecture.json
    
    ## Deliverable: Your arc42 analysis as structured text
  expected_output: "Complete arc42 analysis from facts and analysis"
  agent: arc42_architect

# -----------------------------------------------------------------------------
# PHASE 2: DOCUMENTATION (Based on analysis)
# -----------------------------------------------------------------------------

arc42_introduction:
  description: |
    Create arc42 Chapter 1: Introduction and Goals.
    
    Use the analysis from the previous task.
    
    {system_summary}

    ## Deliverable: 01-introduction.md

    # 01 - Introduction and Goals

    ## 1.1 Requirements Overview
    - System domain and purpose
    - Component statistics
    - Key capabilities

    ## 1.2 Quality Goals
    - Derived from architecture patterns

    ## 1.3 Stakeholders
    - Relevant stakeholders for this system type
  expected_output: "Complete arc42 Introduction chapter"
  agent: arc42_architect
  context:
    - analyze_system
  output_file: "knowledge/architecture/arc42/01-introduction.md"

arc42_constraints:
  description: |
    Create arc42 Chapter 2: Architecture Constraints.
    
    DERIVE constraints from detected technologies:
    - Java version → language constraints
    - Spring Boot → framework constraints  
    - Database type → persistence constraints

    {system_summary}
    {containers_summary}

    ## Deliverable: 02-constraints.md

    # 02 - Architecture Constraints

    ## 2.1 Technical Constraints
    ## 2.2 Organizational Constraints
    ## 2.3 Convention Constraints
  expected_output: "Complete arc42 Constraints chapter"
  agent: arc42_architect
  output_file: "knowledge/architecture/arc42/02-constraints.md"

arc42_context:
  description: |
    Create arc42 Chapter 3: System Scope and Context.
    
    ANALYZE interfaces to understand:
    - WHO uses the system? (external actors)
    - WHAT does it connect to? (external systems)
    - HOW does it communicate? (protocols, formats)

    Query architecture_facts for: interfaces, external dependencies

    {system_summary}

    ## Deliverable: 03-context.md

    # 03 - System Scope and Context

    ## 3.1 Business Context
    ## 3.2 Technical Context  
    ## 3.3 External Dependencies
  expected_output: "Complete arc42 Context chapter"
  agent: arc42_architect
  output_file: "knowledge/architecture/arc42/03-context.md"

arc42_solution_strategy:
  description: |
    Create arc42 Chapter 4: Solution Strategy.
    
    THINK about WHY these technologies were chosen:
    - What problems do they solve?
    - What patterns are being applied?
    - How do they achieve quality goals?

    Query architecture_facts for: architecture patterns, technologies

    {system_summary}

    ## Deliverable: 04-solution-strategy.md

    # 04 - Solution Strategy

    ## 4.1 Technology Decisions
    ## 4.2 Architecture Patterns
    ## 4.3 Achieving Quality Goals
  expected_output: "Complete arc42 Solution Strategy chapter"
  agent: arc42_architect
  output_file: "knowledge/architecture/arc42/04-solution-strategy.md"

# -----------------------------------------------------------------------------
# BUILDING BLOCKS - Split into Sub-Tasks (Strategy 2)
# -----------------------------------------------------------------------------

bb_intro:
  description: |
    Create arc42 Chapter 5 INTRO: Building Block View - Introduction and Level 1.
    
    Write the document header and container overview.
    
    {system_summary}
    {containers_summary}
    
    ## Deliverable: 05-building-blocks.md
    
    # 05 - Building Block View
    
    ## 5.1 Whitebox Overall System (Level 1)
    - Describe the 5 containers and their technologies
    - Use a table format for clarity
    - Explain container orchestration (Docker-Compose)
  expected_output: "Building Blocks intro with Level 1 container overview"
  agent: arc42_architect
  output_file: "knowledge/architecture/arc42/05-building-blocks.md"

bb_controllers:
  description: |
    Document the CONTROLLERS layer for Building Block View.
    
    Use list_components_by_stereotype with stereotype="controller" to get the list.
    
    {system_summary}
    
    Write output using doc_writer to: knowledge/architecture/arc42/parts/bb-controllers.md
    
    ### 5.2.1 Presentation Layer (Controllers)
    - Document the controllers shown (max 30)
    - Use a table: Controller | Primary Responsibility
    - Focus on REST endpoints and their purpose
  expected_output: "Controllers section written to file"
  agent: arc42_architect
  output_file: "knowledge/architecture/arc42/parts/bb-controllers.md"

bb_services:
  description: |
    Document the SERVICES layer for Building Block View.
    
    Use list_components_by_stereotype with stereotype="service" to get the list.
    
    {system_summary}
    
    Write output using doc_writer to: knowledge/architecture/arc42/parts/bb-services.md
    
    ### 5.2.2 Business Layer (Services)
    - Document the services shown (max 30)
    - Use a table: Service | Core Responsibility
    - Focus on business logic and workflows
  expected_output: "Services section written to file"
  agent: arc42_architect
  output_file: "knowledge/architecture/arc42/parts/bb-services.md"

bb_entities:
  description: |
    Document the ENTITIES layer for Building Block View.
    
    Use list_components_by_stereotype with stereotype="entity" to get the list.
    
    {system_summary}
    
    Write output using doc_writer to: knowledge/architecture/arc42/parts/bb-entities.md
    
    ### 5.2.3 Domain Layer (Entities)
    - Document the entities shown (max 30)
    - Use a table: Entity | Description
    - Focus on core domain objects
  expected_output: "Entities section written to file"
  agent: arc42_architect
  output_file: "knowledge/architecture/arc42/parts/bb-entities.md"

bb_repositories:
  description: |
    Document the REPOSITORIES layer for Building Block View.
    
    Use list_components_by_stereotype with stereotype="repository" to get the list.
    
    {system_summary}
    
    Write output using doc_writer to: knowledge/architecture/arc42/parts/bb-repositories.md
    
    ### 5.2.4 Persistence Layer (Repositories)
    - Document the repositories shown
    - Use a table: Repository (DAO) | Managed Entity
  expected_output: "Repositories section written to file"
  agent: arc42_architect
  output_file: "knowledge/architecture/arc42/parts/bb-repositories.md"

bb_merge:
  description: |
    MERGE all Building Block sections into the final Chapter 5.
    
    READ these files using safe_file_read:
    1. knowledge/architecture/arc42/05-building-blocks.md (intro)
    2. knowledge/architecture/arc42/parts/bb-controllers.md
    3. knowledge/architecture/arc42/parts/bb-services.md
    4. knowledge/architecture/arc42/parts/bb-entities.md
    5. knowledge/architecture/arc42/parts/bb-repositories.md
    
    COMBINE into one complete document and write to 05-building-blocks.md
    
    Add a final section:
    ## 5.3 Component Dependencies
    - Summarize layer interactions (Controller→Service→Repository→Entity)
    
    {system_summary}
  expected_output: "Complete arc42 Chapter 5 Building Blocks"
  agent: arc42_architect
  output_file: "knowledge/architecture/arc42/05-building-blocks.md"

