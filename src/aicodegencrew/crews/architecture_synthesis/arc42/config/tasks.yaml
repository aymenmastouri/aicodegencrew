    Extract terminology:
    - Business terms from domain
    - Technical terms
    - Abbreviations

    {system_summary}

    ## Deliverable: 12-glossary.md
  expected_output: "Complete arc42 Glossary"
  agent: architect
  context:
    - arc42_risks
  output_file: "knowledge/architecture/arc42/12-glossary.md"

quality_gate:
  description: |
    Quality review of all arc42 chapters.
    
    Validate:
    - All 12 chapters complete
    - Content consistency
    - No missing sections

    ## Deliverable: quality/arc42-report.md
  expected_output: "Quality gate report"
  agent: architect
  context:
    - arc42_glossary
  output_file: "knowledge/architecture/quality/arc42-report.md"
