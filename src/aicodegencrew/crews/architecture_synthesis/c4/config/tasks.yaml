quality_gate:
  description: |
    Quality review of all C4 levels.
    
    ## DATA SOURCES
    1. analyzed_architecture.json: Style, patterns, quality (Phase 2)
    2. architecture_facts.json: Components, relations, containers (Phase 1)
    
    READ all C4 files and validate:
    - All 4 levels complete
    - Each level has DrawIO diagram
    - Content based on REAL facts
    - Diagrams are syntactically correct
    
    ## DELIVERABLE: quality/c4-report.md
    
    # C4 Quality Report
    
    | Level | Target Pages | Actual | Diagram | Status |
    |-------|--------------|--------|---------|--------|
    | Context | 8 | - | c4-context.drawio | ✓/✗ |
    | Container | 8 | - | c4-container.drawio | ✓/✗ |
    | Component | 8 | - | c4-component.drawio | ✓/✗ |
    | Deployment | 6 | - | c4-deployment.drawio | ✓/✗ |
    | **TOTAL** | **~30** | - | - | - |
  expected_output: "Quality gate report"
  agent: c4_architect
  context: []
  output_file: "knowledge/architecture/quality/c4-report.md"
