# =============================================================================
# C4 Crew - Task Definitions (Phase 3)
# =============================================================================
# INPUT:
#   - architecture_facts.json (Phase 1): Exact component names, relations
#   - analyzed_architecture.json (Phase 2): Architecture style, patterns, quality
# OUTPUT:
#   - c4/c4-context.md + .drawio
#   - c4/c4-container.md + .drawio
#   - c4/c4-component.md + .drawio
#   - c4/c4-deployment.md + .drawio
# =============================================================================

# -----------------------------------------------------------------------------
# PHASE 1: ANALYSIS (Use analyzed.json + query facts for details)
# -----------------------------------------------------------------------------

analyze_system:
  description: |
    YOU are the Software Architect. Create C4 analysis from Phase 2 output + facts!
    
    DATA SOURCES:
    - analyzed_architecture.json: Already contains style, patterns, quality (from Phase 2)
    - architecture_facts.json: Query for specific details (containers, components, relations)
    
    ## STEP 1: Read Architecture Analysis
    The analyzed_architecture.json already contains:
    - architecture.primary_style
    - architecture.layers
    - patterns[]
    - technology.backend/frontend/database
    
    ## STEP 2: Query Facts for Details
    Use tools to get EXACT data:
    - query_architecture_facts(category="containers") → deployment units
    - query_architecture_facts(category="interfaces") → API surface
    - list_components_by_stereotype for layer details
    
    ## YOUR C4 ANALYSIS must identify:
    1. SYSTEM: Name and domain from analysis
    2. CONTAINERS: From facts.json containers[]
    3. COMPONENTS: From facts.json components[]
    4. EXTERNAL: Derive from interfaces[]
    5. ARCHITECTURE STYLE: From analyzed_architecture.json
    
    ## Deliverable: Your C4 analysis as structured text
  expected_output: "Complete C4 analysis from facts and analysis"
  agent: c4_architect

# -----------------------------------------------------------------------------
# PHASE 2: C4 DIAGRAMS (Based on analysis)
# -----------------------------------------------------------------------------

c4_context:
  description: |
    Create C4 Level 1: System Context diagram and documentation.
    
    Use the analysis from the previous task.

    {system_summary}

    ## DELIVERABLE: c4/c4-context.md + c4-context.drawio

    Show the system as a black box with:
    - External actors (users, admins)
    - External systems (databases, APIs, services)
    - Communication protocols
  expected_output: "Complete C4 Context with DrawIO diagram"
  agent: c4_architect
  context:
    - analyze_system
  output_file: "knowledge/architecture/c4/c4-context.md"

c4_container:
  description: |
    Create C4 Level 2: Container diagram.
    
    Show all deployable units from the analysis:
    - Backend applications
    - Frontend applications
    - Databases
    - Message queues
    - External services

    {system_summary}
    {containers_summary}

    ## DELIVERABLE: c4/c4-container.md + c4-container.drawio
  expected_output: "Complete C4 Container with DrawIO diagram"
  agent: c4_architect
  context:
    - c4_context
  output_file: "knowledge/architecture/c4/c4-container.md"

c4_component:
  description: |
    Create C4 Level 3: Component diagram.
    
    ⚠️ This system has 800+ components! Show LAYER STRUCTURE, not all components.
    
    ## APPROACH:
    1. Query facts for component counts by stereotype
    2. Show REPRESENTATIVE components per layer (5-10 examples each)
    3. Focus on layer boundaries and dependencies
    
    Show internal structure of each container:
    - Controllers (presentation layer) - show count + key examples
    - Services (business layer) - show count + key examples
    - Repositories (data access layer) - show count + key examples
    - Entities (domain model) - show count + key examples

    {system_summary}
    {components_summary}

    ## DELIVERABLE: c4/c4-component.md + c4-component.drawio
    
    DrawIO diagram should show LAYERS with component counts, not 800 boxes!
  expected_output: "Complete C4 Component with DrawIO diagram showing layer structure"
  agent: c4_architect
  context:
    - c4_container
  output_file: "knowledge/architecture/c4/c4-component.md"

c4_deployment:
  description: |
    Create C4 Level 4: Deployment diagram.
    
    Show infrastructure topology:
    - Server nodes
    - Container placement
    - Network zones
    - Scaling strategy

    {system_summary}
    {containers_summary}

    ## DELIVERABLE: c4/c4-deployment.md + c4-deployment.drawio
  expected_output: "Complete C4 Deployment with DrawIO diagram"
  agent: c4_architect
  context:
    - c4_component
  output_file: "knowledge/architecture/c4/c4-deployment.md"
