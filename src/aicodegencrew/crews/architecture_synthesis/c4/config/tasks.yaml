# =============================================================================
# C4 Crew - Task Definitions (Phase 3) - SUBTASK STRUCTURE
# =============================================================================
# TARGET: ~30 pages C4 documentation with WORKING DrawIO diagrams
#
# STRUCTURE: Each major section is a subtask, merged at the end
#
# DATA SOURCES (used by all subtasks):
#   - analyzed_architecture.json: Style, patterns, quality (Phase 2)
#   - architecture_facts.json: Components, relations, containers (Phase 1)
# =============================================================================

# =============================================================================
# ANALYZE SYSTEM - Split into subtasks
# =============================================================================

analyze_system_datasources:
  description: |
    Load and validate the data sources for C4 documentation.
    
    ## DATA SOURCES
    1. analyzed_architecture.json: Style, patterns, quality (Phase 2)
    2. architecture_facts.json: Components, relations, containers (Phase 1)
    
    ## TASK
    - Query and validate both JSON files exist
    - Extract system name, type, technology stack
    - Create summary of available data for C4 model
    
    ## DELIVERABLE
    Summary of available data sources for C4 diagrams.
  expected_output: "Data sources summary for C4"
  agent: c4_architect

analyze_system_context:
  description: |
    Analyze Level 1: System Context elements.
    
    ## DATA SOURCES
    1. analyzed_architecture.json: Style, patterns, quality (Phase 2)
    2. architecture_facts.json: Components, relations, containers (Phase 1)
    
    ## ANALYSIS REQUIRED
    
    ### A. The System
    - Full system name
    - Primary purpose (1 paragraph)
    - Business value
    
    ### B. External Actors (Users)
    - End Users: Who uses the system directly?
    - Administrators: Who configures/manages the system?
    - API Consumers: What other systems call our APIs?
    - Background Processes: Timers, schedulers?
    
    ### C. External Systems
    - Databases: Type, purpose
    - External APIs: Services consumed
    - Message Queues: If applicable
    - Identity Providers: Authentication systems
    
    ## DELIVERABLE
    Complete Level 1 context analysis.
  expected_output: "Level 1 context analysis"
  agent: c4_architect
  context: []

analyze_system_containers:
  description: |
    Analyze Level 2: Container elements.
    
    ## DATA SOURCES
    1. analyzed_architecture.json: Style, patterns, quality (Phase 2)
    2. architecture_facts.json: Components, relations, containers (Phase 1)
    
    Query architecture_facts.json for containers[]:
    
    ## ANALYSIS REQUIRED
    For each container:
    | Container | Technology | Purpose | Ports | Dependencies |
    |-----------|------------|---------|-------|--------------|
    
    Container categories:
    - Web Applications (Frontend)
    - Backend Services (APIs)
    - Databases
    - Message Brokers
    - Caches
    - Batch Jobs
    
    ## DELIVERABLE
    Complete Level 2 container analysis.
  expected_output: "Level 2 container analysis"
  agent: c4_architect
  context: []

analyze_system_components:
  description: |
    Analyze Level 3: Component elements.
    
    ## DATA SOURCES
    1. analyzed_architecture.json: Style, patterns, quality (Phase 2)
    2. architecture_facts.json: Components, relations, containers (Phase 1)
    
    Query list_components_by_stereotype for each layer:
    
    ## ANALYSIS REQUIRED
    
    | Layer | Components | Count | Purpose |
    |-------|------------|-------|---------|
    | Controllers | ... | X | API endpoints |
    | Services | ... | X | Business logic |
    | Repositories | ... | X | Data access |
    | Entities | ... | X | Domain model |
    
    Component Dependencies:
    - Controller → Service mappings
    - Service → Repository mappings
    - Cross-service dependencies
    
    ## DELIVERABLE
    Complete Level 3 component analysis.
  expected_output: "Level 3 component analysis"
  agent: c4_architect
  context: []

analyze_system_deployment:
  description: |
    Analyze Level 4: Deployment topology.
    
    ## DATA SOURCES
    1. analyzed_architecture.json: Style, patterns, quality (Phase 2)
    2. architecture_facts.json: Components, relations, containers (Phase 1)
    
    ## ANALYSIS REQUIRED
    - Infrastructure nodes
    - Container placement
    - Network zones
    - Scaling configuration
    
    ## DELIVERABLE
    Complete Level 4 deployment analysis.
  expected_output: "Level 4 deployment analysis"
  agent: c4_architect
  context: []

