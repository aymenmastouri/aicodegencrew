stages:
  - lint
  - test
  - build
  - e2e
  - docker

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/ui/frontend/.cache/npm"
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

# ---------------------------------------------------------------------------
# Cache templates
# ---------------------------------------------------------------------------
.python-cache: &python-cache
  cache:
    key: python-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
      - .venv/

.node-cache: &node-cache
  cache:
    key: node-${CI_COMMIT_REF_SLUG}
    paths:
      - ui/frontend/.cache/npm
      - ui/frontend/node_modules/

# ---------------------------------------------------------------------------
# Setup templates
# ---------------------------------------------------------------------------
.python-setup:
  image: python:${PYTHON_VERSION}-slim
  <<: *python-cache
  before_script:
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install --upgrade pip
    - pip install -e ".[dev]"

.node-setup:
  image: node:${NODE_VERSION}-alpine
  <<: *node-cache
  before_script:
    - cd ui/frontend
    - npm ci --prefer-offline

# ---------------------------------------------------------------------------
# Stage 1: Lint (parallel)
# ---------------------------------------------------------------------------
ruff-lint:
  extends: .python-setup
  stage: lint
  script:
    - source .venv/bin/activate
    - ruff check src/ ui/backend/ tests/
    - ruff format --check src/ ui/backend/ tests/

eslint-lint:
  extends: .node-setup
  stage: lint
  script:
    - npx eslint "src/**/*.ts"

prettier-check:
  extends: .node-setup
  stage: lint
  script:
    - npx prettier --check "src/**/*.{ts,html,scss,json}"

# ---------------------------------------------------------------------------
# Stage 2: Test (parallel)
# ---------------------------------------------------------------------------
pytest-unit:
  extends: .python-setup
  stage: test
  script:
    - source .venv/bin/activate
    - python -m pytest tests/ -m "not e2e and not slow" --ignore=tests/e2e
      --junitxml=test-results/pytest-junit.xml
      --cov=src/aicodegencrew --cov-report=xml:test-results/coverage.xml
      --cov-report=term
  artifacts:
    when: always
    reports:
      junit: test-results/pytest-junit.xml
      coverage_report:
        coverage_format: cobertura
        path: test-results/coverage.xml
    expire_in: 7 days

jest-unit:
  extends: .node-setup
  stage: test
  allow_failure: true
  script:
    - npx jest --ci --coverage
      --reporters=default --reporters=jest-junit
  artifacts:
    when: always
    reports:
      junit: ui/frontend/test-results/junit.xml
    paths:
      - ui/frontend/coverage/
    expire_in: 7 days

# ---------------------------------------------------------------------------
# Stage 3: Build (parallel)
# ---------------------------------------------------------------------------
angular-build:
  extends: .node-setup
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - ui/frontend/dist/
    expire_in: 1 day

python-build:
  extends: .python-setup
  stage: build
  script:
    - source .venv/bin/activate
    - pip install build
    - python -m build --wheel
  artifacts:
    paths:
      - dist/*.whl
    expire_in: 7 days

# ---------------------------------------------------------------------------
# Stage 4: E2E
# ---------------------------------------------------------------------------
playwright-e2e:
  stage: e2e
  image: mcr.microsoft.com/playwright:v1.58.2-noble
  needs:
    - job: angular-build
      artifacts: true
  allow_failure: true
  before_script:
    - apt-get update -qq && apt-get install -y -qq python3-pip python3-venv > /dev/null
    - python3 -m venv $CI_PROJECT_DIR/.venv
    - source $CI_PROJECT_DIR/.venv/bin/activate
    - pip install --upgrade pip
    - pip install -e ".[dev]"
    - cd $CI_PROJECT_DIR/ui/frontend && npm ci --prefer-offline
  script:
    - cd $CI_PROJECT_DIR/ui/frontend
    # Serve the pre-built Angular dist
    - npx http-server dist/dashboard/browser -p 4200 --silent &
    # Start backend
    - source $CI_PROJECT_DIR/.venv/bin/activate
    - python -m uvicorn ui.backend.main:app --host 0.0.0.0 --port 8001 --app-dir $CI_PROJECT_DIR &
    - sleep 5
    - cd $CI_PROJECT_DIR/ui/frontend
    - npx playwright test --reporter=list,junit
  artifacts:
    when: always
    reports:
      junit: ui/frontend/test-results/e2e-junit.xml
    paths:
      - ui/frontend/playwright-report/
    expire_in: 7 days

# ---------------------------------------------------------------------------
# Stage 5: Docker (only on relevant changes)
# ---------------------------------------------------------------------------
docker-backend:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  needs:
    - job: pytest-unit
      artifacts: false
  rules:
    - changes:
        - ui/backend/**/*
        - ui/backend/Dockerfile
        - pyproject.toml
      when: on_success
    - when: never
  script:
    - docker build -t aicodegencrew-backend:ci -f ui/backend/Dockerfile .

docker-frontend:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  needs:
    - job: angular-build
      artifacts: false
  rules:
    - changes:
        - ui/frontend/**/*
        - ui/frontend/Dockerfile
      when: on_success
    - when: never
  script:
    - docker build -t aicodegencrew-frontend:ci -f ui/frontend/Dockerfile ui/frontend/
