# =============================================================================
# SDLC Phase Configuration
# =============================================================================
# Control which phases are active and their execution order.
#
# ARCHITECTURE:
#   crews/      = AI Agent Workflows (LLM required)
#   pipelines/  = Automated Processes (deterministic, no LLM)
#
# INDEXING CONTROL:
#   Indexing is controlled centrally via INDEX_MODE in .env:
#     off   = Skip indexing (use existing index)
#     auto  = Index only if needed (default)
#     force = Clear cache and re-index from scratch
#     smart = Update only changed files
#
#   CLI override: python run_phase.py --index-mode force
#
# LLM PROVIDER:
#   LLM for AI agents is controlled via LLM_PROVIDER in .env:
#     local  = Ollama (qwen2.5-coder:7b at localhost:11434)
#     onprem = Capgemini (Llama-3.3-70B at bmf-ai.apps.ce.capgemini.com)
#
#   Embeddings always use local Ollama (all-minilm)
# =============================================================================

phases:
  # =========================================================================
  # PIPELINE: Phase 0 - Repository Indexing
  # =========================================================================
  # Type:      Pipeline (no AI, only embeddings)
  # Location:  pipelines/indexing/indexing_pipeline.py
  # Control:   INDEX_MODE in .env (off/auto/force/smart)
  # Output:    .cache/.chroma (ChromaDB vector store)
  # =========================================================================
  phase0_indexing:
    enabled: true
    name: "Repository Indexing"
    description: "Index codebase into ChromaDB for RAG"
    type: pipeline
    required: true
    order: 0
    config:
      # Controlled via .env: INDEX_MODE, EMBED_MODEL, CHROMA_DIR

  # =========================================================================
  # PIPELINE: Phase 1 - Architecture Facts (DETERMINISTIC, NO LLM!)
  # =========================================================================
  # Type:      Pipeline (deterministic extraction, no AI)
  # Location:  pipelines/architecture_facts/
  # Output:    knowledge/architecture/architecture_facts.json
  #            knowledge/architecture/evidence_map.json
  # 
  # This is the SINGLE SOURCE OF TRUTH for architecture.
  # Everything not in architecture_facts.json must NOT be written by Phase 2.
  # =========================================================================
  phase1_architecture_facts:
    enabled: true
    name: "Architecture Facts Extraction"
    description: "Deterministic extraction of architecture facts (no LLM)"
    type: pipeline
    required: true
    order: 1
    dependencies: [phase0_indexing]
    config:
      output_dir: "./knowledge/architecture"

  # =========================================================================
  # CREW: Phase 2 - Architecture Synthesis (LLM, evidence-first)
  # =========================================================================
  # Type:      Crew (AI Agents)
  # Location:  crews/architecture_synthesis/
  # Input:     architecture_facts.json + evidence_map.json
  # Output:    knowledge/architecture/c4/
  #            knowledge/architecture/arc42/
  #            knowledge/architecture/runtime/
  #            knowledge/architecture/evidence/
  # 
  # RULES:
  # - Only synthesize what is in architecture_facts.json
  # - Every statement must reference evidence
  # - If no evidence, mark as UNKNOWN
  # - No invented containers/components
  # =========================================================================
  
  # =========================================================================
  # CREW: Phase 2 - Architecture Analysis (NEW!)
  # =========================================================================
  # Type:      Crew (AI Agents - 4 specialized analysts)
  # Location:  crews/architecture_analysis/
  # Input:     architecture_facts.json + evidence_map.json + ChromaDB
  # Output:    knowledge/architecture/analyzed_architecture.json
  # 
  # AGENTS:
  # 1. Technical Architect: Styles, patterns, tech stack, layers
  # 2. Functional Analyst: Domain model, capabilities, use cases
  # 3. Quality Analyst: Technical debt, risks, quality attributes
  # 4. Synthesis Lead: Merge all analyses into unified JSON
  # =========================================================================
  phase2_architecture_analysis:
    enabled: true
    name: "Architecture Analysis"
    description: "Multi-agent analysis of architecture facts"
    type: crew
    required: true
    order: 2
    dependencies: [phase1_architecture_facts]
    config:
      output_dir: "./knowledge/architecture"
      temperature: 0.2
      max_iterations: 15
      verbose: true

  # =========================================================================
  # CREW: Phase 3 - Architecture Synthesis (LLM, evidence-first)
  # =========================================================================
  # Type:      Crew (AI Agents)
  # Location:  crews/architecture_synthesis/
  # Input:     architecture_facts.json + analyzed_architecture.json + ChromaDB
  # Output:    knowledge/architecture/c4/
  #            knowledge/architecture/arc42/
  #            knowledge/architecture/runtime/
  #            knowledge/architecture/evidence/
  # 
  # RULES:
  # - Only synthesize what is in architecture_facts.json
  # - Every statement must reference evidence
  # - If no evidence, mark as UNKNOWN
  # - No invented containers/components
  # =========================================================================
  phase3_architecture_synthesis:
    enabled: true
    name: "Architecture Synthesis"
    description: "AI synthesizes C4 and arc42 from architecture facts"
    type: crew
    required: false
    order: 3
    dependencies: [phase2_architecture_analysis]
    config:
      output_dir: "./knowledge/architecture"
      temperature: 0.2
      max_iterations: 15
      verbose: true

  # =========================================================================
  # =========================================================================
  # PIPELINE: Phase 4 - Development Planning (HYBRID ARCHITECTURE) ⚡
  # =========================================================================
  # Type:      Pipeline (Hybrid: Deterministic + 1 LLM Call)
  # Location:  pipelines/development_planning/
  # Architecture:
  #   Stage 1: Input Parser (deterministic, <1s)
  #   Stage 2: Component Discovery (RAG + scoring, 2-5s)
  #   Stage 3: Pattern Matcher (TF-IDF + rules, 1-3s)
  #   Stage 4: Plan Generator (LLM call, 15-30s)
  #   Stage 5: Validator (Pydantic, <1s)
  #
  # Total Duration: 18-40 seconds (vs 5-7 minutes with CrewAI)
  # LLM Calls: 1 (vs 5 with CrewAI)
  # Success Rate: 95%+ (deterministic stages)
  #
  # Input:
  #   - inputs/tasks/ (JIRA XML, DOCX, Excel, logs, etc.)
  #   - architecture_facts.json (Phase 1, all 17 keys)
  #   - analyzed_architecture.json (Phase 2)
  #   - ChromaDB (Phase 0, semantic search)
  #
  # Output: knowledge/development/{task_id}_plan.json
  #   - affected_components (from ChromaDB RAG + scoring)
  #   - implementation_steps
  #   - test_strategy (from 925 test patterns, TF-IDF similarity)
  #   - security_considerations (from 143 security details)
  #   - validation_strategy (from 149 validation patterns)
  #   - error_handling (from 23 error patterns)
  #   - architecture_context (from analyzed_architecture.json)
  #   - risks, complexity estimate
  # =========================================================================
  phase4_development_planning:
    enabled: true
    name: "Development Planning (Hybrid Pipeline)"
    description: "Fast, evidence-based implementation plans using hybrid architecture"
    type: pipeline
    required: false
    order: 4
    dependencies: [phase2_architecture_analysis]
    config:
      output_dir: "./knowledge/development"
      input_dirs:
        tasks: "./inputs/tasks"
        requirements: "./inputs/requirements"
        logs: "./inputs/logs"
        reference: "./inputs/reference"

  # =========================================================================
  # CREW: Phase 5 - Code Generation (PLANNED)
  # =========================================================================
  # Type:      Crew (AI Agents)
  # Location:  crews/code_generation/ (planned)
  # Purpose:   Feature implementation following architecture patterns
  # Tasks:     Generate code matching existing service/component patterns
  # Input:     Task plan from Phase 4 + architecture patterns
  # Output:    New code files (Java/TypeScript)
  # =========================================================================
  phase5_code_generation:
    enabled: false
    name: "Code Generation"
    description: "Feature implementation following architecture patterns"
    type: crew
    required: false
    order: 5
    dependencies: [phase4_task_understanding]
    config:
      output_dir: "./knowledge/codegen"

  # =========================================================================
  # CREW: Phase 6 - Test Generation (PLANNED)
  # =========================================================================
  # Type:      Crew (AI Agents)
  # Location:  crews/test_generation/ (planned)
  # Purpose:   Generate tests matching existing test patterns
  # Tasks:     Unit tests, integration tests following 925 existing patterns
  # Input:     Generated code from Phase 5 + test patterns
  # Output:    JUnit/Jest test files
  # =========================================================================
  phase6_test_generation:
    enabled: false
    name: "Test Generation"
    description: "Generate tests matching existing patterns"
    type: crew
    required: false
    order: 6
    dependencies: [phase5_code_generation]
    config:
      output_dir: "./knowledge/testing"

  # =========================================================================
  # PIPELINE: Phase 7 - Review + Deploy (PLANNED)
  # =========================================================================
  # Type:      Pipeline (deterministic)
  # Location:  pipelines/review_deploy/ (planned)
  # Purpose:   Build validation, CI/CD integration, PR merge
  # Tasks:     Compile check, run tests, create PR, merge
  # Input:     Generated code + tests from Phase 5-6
  # Output:    Merged PR, deployed code
  # =========================================================================
  phase7_review_deploy:
    enabled: false
    name: "Review + Deploy"
    description: "Build validation, CI/CD integration, PR merge"
    type: pipeline
    required: false
    order: 7
    dependencies: [phase6_test_generation]
    config:
      output_dir: "./knowledge/deployment"

# =============================================================================
# Execution Settings
# =============================================================================
execution:
  mode: "architecture_workflow"
  stop_on_error: true
  parallel_execution: false

# =============================================================================
# Quick Presets
# =============================================================================
presets:
  # Index repository only
  indexing_only:
    - phase0_indexing

  # Index + architecture facts (deterministic, no LLM)
  facts_only:
    - phase0_indexing
    - phase1_architecture_facts

  # Index + facts + analysis (Phase 2 only)
  analysis_only:
    - phase0_indexing
    - phase1_architecture_facts
    - phase2_architecture_analysis

  # Index + facts + analysis + synthesis (full architecture documentation)
  architecture_workflow:
    - phase0_indexing
    - phase1_architecture_facts
    - phase2_architecture_analysis
    - phase3_architecture_synthesis

  # Architecture + Development Planning
  architecture_full:
    - phase0_indexing
    - phase1_architecture_facts
    - phase2_architecture_analysis
    - phase3_architecture_synthesis
    - phase4_development_planning

  # Full SDLC pipeline (all phases)
  full_pipeline:
    - phase0_indexing
    - phase1_architecture_facts
    - phase2_architecture_analysis
    - phase3_architecture_synthesis
    - phase4_development_planning
    - phase5_code_generation
    - phase6_test_generation
    - phase7_review_deploy
