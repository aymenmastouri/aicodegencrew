# =============================================================================
# SDLC Phase Configuration
# =============================================================================
# Control which phases are active and their execution order.
#
# ARCHITECTURE:
#   crews/      = AI Agent Workflows (LLM required)
#   pipelines/  = Automated Processes (deterministic, no LLM)
#
# INDEXING CONTROL:
#   Indexing is controlled centrally via INDEX_MODE in .env:
#     off   = Skip indexing (use existing index)
#     auto  = Index only if needed (default)
#     force = Clear cache and re-index from scratch
#     smart = Update only changed files
#
#   CLI override: python run_phase.py --index-mode force
#
# LLM PROVIDER:
#   LLM for AI agents is controlled via LLM_PROVIDER in .env:
#     local  = Ollama (qwen2.5-coder:7b at localhost:11434)
#     onprem = On-premises (gpt-oss-120b at sov-ai-platform.nue.local.vm)
#
#   Embeddings always use local Ollama (all-minilm)
# =============================================================================

phases:
  # =========================================================================
  # PIPELINE: Discover - Repository Indexing
  # =========================================================================
  # PIPELINE: Discover — Repository Indexing
  # =========================================================================
  # Location:  pipelines/indexing/indexing_pipeline.py
  # Control:   INDEX_MODE in .env (off/auto/force/smart)
  # Output:    knowledge/discover/ (Qdrant vectors + symbols + evidence)
  # LLM:       No (only embeddings)
  # =========================================================================
  discover:
    enabled: true
    name: "Discover"
    description: "Index repository into vector store (symbols, evidence, embeddings)"
    type: pipeline
    required: true
    order: 0
    config:
      # Controlled via .env: INDEX_MODE, EMBED_MODEL

  # =========================================================================
  # PIPELINE: Extract — Architecture Facts (deterministic, kein LLM)
  # =========================================================================
  # Location:  pipelines/architecture_facts/
  # Output:    knowledge/extract/architecture_facts.json + evidence_map.json
  # LLM:       No
  # =========================================================================
  extract:
    enabled: true
    name: "Extract"
    description: "Extract 16 architecture dimensions (no LLM)"
    type: pipeline
    required: true
    order: 1
    dependencies: [discover]
    config:
      output_dir: "./knowledge/extract"

  # =========================================================================
  # PIPELINE: Analyze — Architecture Analysis
  # =========================================================================
  # Location:  pipelines/analysis/pipeline.py → AnalysisPipeline
  # Flow:      16 parallele LLM-Calls → Review → Selective Redo → Synthese
  # Output:    knowledge/analyze/analyzed_architecture.json
  # LLM:       Yes (16 sections + 1 review + N redo + 1 synthesis)
  # =========================================================================
  analyze:
    enabled: true
    name: "Analyze"
    description: "16 parallel analyses + cross-section review + synthesis"
    type: pipeline
    required: true
    order: 2
    dependencies: [extract]
    config:
      output_dir: "./knowledge/analyze"

  # =========================================================================
  # PIPELINE: Document — Arc42 + C4 Documentation
  # =========================================================================
  # Location:  pipelines/document/pipeline.py → DocumentPipeline
  # Flow:      DataCollector → PromptBuilder → LLM → Validator → Reviewer → Write
  # Output:    knowledge/document/ (c4/, arc42/, quality/)
  # LLM:       Yes (2 calls per chapter: generate + content review)
  # =========================================================================
  document:
    enabled: true
    name: "Document"
    description: "Generate Arc42 + C4 docs with content review"
    type: pipeline
    required: false
    order: 3
    dependencies: [analyze]
    config:
      output_dir: "./knowledge/document"

  # =========================================================================
  # PIPELINE: Triage — Issue Classification
  # =========================================================================
  # Location:  pipelines/triage/pipeline.py → TriagePipeline
  # Flow:      Deterministic scan (<5s) + single LLM synthesis
  # Output:    knowledge/triage/ (findings, customer.md, developer.md)
  # LLM:       Yes (1 call + optional retry)
  # =========================================================================
  triage:
    enabled: true
    name: "Triage"
    description: "Issue classification, blast radius, customer/developer reports"
    type: pipeline
    required: false
    order: 4
    dependencies: [extract]
    config:
      output_dir: "./knowledge/triage"

  # =========================================================================
  # PIPELINE: Plan — Development Planning
  # =========================================================================
  # Location:  pipelines/plan/pipeline.py → PlanPipeline
  # Flow:      4 deterministic stages + 1 LLM call (18-40s total)
  # Output:    knowledge/plan/{task_id}_plan.json
  # LLM:       Yes (1 call + optional retry)
  # =========================================================================
  plan:
    enabled: true
    name: "Plan"
    description: "Generate implementation plans (hybrid: deterministic + 1 LLM call)"
    type: pipeline
    required: false
    order: 5
    dependencies: [analyze]
    config:
      output_dir: "./knowledge/plan"
      input_dirs:
        tasks: "./inputs/tasks"
        requirements: "./inputs/requirements"
        logs: "./inputs/logs"
        reference: "./inputs/reference"

  # =========================================================================
  # CREW: Implement — Code Generation (braucht Task-IDs)
  # =========================================================================
  # Location:  crews/implement/crew.py → ImplementCrew
  # Flow:      Plan lesen → Context sammeln → Code generieren → Build verify
  # Output:    Git branch codegen/{task_id} + knowledge/implement/{task_id}_report.json
  # LLM:       Yes (multi-turn agent with tools)
  # =========================================================================
  implement:
    enabled: true
    name: "Implement"
    description: "Generate code from plans (requires task IDs)"
    type: crew
    required: false
    order: 6
    dependencies: [plan]
    config:
      output_dir: "./knowledge/implement"

  # =========================================================================
  # CREW: Verify — Test Generation (in Entwicklung)
  # =========================================================================
  # Location:  crews/verify/ (planned)
  # Output:    knowledge/verify/
  # LLM:       Yes
  # =========================================================================
  verify:
    enabled: true
    name: "Verify"
    description: "Generate tests (work in progress)"
    type: crew
    required: false
    order: 7
    dependencies: [implement]
    config:
      output_dir: "./knowledge/verify"

  # =========================================================================
  # PIPELINE: Deliver — Review + Consistency Guard
  # =========================================================================
  # Location:  pipelines/review/pipeline.py → ReviewPipeline
  # Flow:      Deterministic consistency checks + LLM synthesis report
  # Output:    knowledge/deliver/ (consistency.json, quality.json, synthesis-report.md)
  # LLM:       Yes (1 call)
  # =========================================================================
  deliver:
    enabled: true
    name: "Deliver"
    description: "Consistency check + quality report (work in progress)"
    type: pipeline
    required: false
    order: 8
    dependencies: [implement]
    config:
      output_dir: "./knowledge/deliver"

# =============================================================================
# Execution Settings
# =============================================================================
execution:
  mode: "document"
  stop_on_error: true
  parallel_execution: false

# =============================================================================
# Quick Presets
# =============================================================================
