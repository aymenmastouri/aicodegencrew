# =============================================================================
# SDLC Phase Configuration
# =============================================================================
# Control which phases are active and their execution order.
#
# ARCHITECTURE:
#   crews/      = AI Agent Workflows (LLM required)
#   pipelines/  = Automated Processes (deterministic, no LLM)
#
# INDEXING CONTROL:
#   Indexing is controlled centrally via INDEX_MODE in .env:
#     off   = Skip indexing (use existing index)
#     auto  = Index only if needed (default)
#     force = Clear cache and re-index from scratch
#     smart = Update only changed files
#
#   CLI override: python run_phase.py --index-mode force
#
# LLM PROVIDER:
#   LLM for AI agents is controlled via LLM_PROVIDER in .env:
#     local  = Ollama (qwen2.5-coder:7b at localhost:11434)
#     onprem = On-premises (gpt-oss-120b at sov-ai-platform.nue.local.vm)
#
#   Embeddings always use local Ollama (all-minilm)
# =============================================================================

phases:
  # =========================================================================
  # PIPELINE: Discover - Repository Indexing
  # =========================================================================
  # Type:      Pipeline (no AI, only embeddings)
  # Location:  pipelines/indexing/indexing_pipeline.py
  # Control:   INDEX_MODE in .env (off/auto/force/smart)
  # Output:    knowledge/discover (ChromaDB vector store)
  # =========================================================================
  discover:
    enabled: true
    name: "Discover"
    description: "Index codebase into ChromaDB for RAG"
    type: pipeline
    required: true
    order: 0
    config:
      # Controlled via .env: INDEX_MODE, EMBED_MODEL, CHROMA_DIR

  # =========================================================================
  # PIPELINE: Extract - Architecture Facts (DETERMINISTIC, NO LLM!)
  # =========================================================================
  # Type:      Pipeline (deterministic extraction, no AI)
  # Location:  pipelines/architecture_facts/
  # Output:    knowledge/extract/architecture_facts.json
  #            knowledge/extract/evidence_map.json
  #
  # This is the SINGLE SOURCE OF TRUTH for architecture.
  # Everything not in architecture_facts.json must NOT be written by Analyze.
  # =========================================================================
  extract:
    enabled: true
    name: "Extract"
    description: "Deterministic extraction of architecture facts (no LLM)"
    type: pipeline
    required: true
    order: 1
    dependencies: [discover]
    config:
      output_dir: "./knowledge/extract"

  # =========================================================================
  # CREW: Analyze - Architecture Analysis
  # =========================================================================
  # Type:      Crew (AI Agents - 4 specialized analysts)
  # Location:  crews/architecture_analysis/
  # Input:     architecture_facts.json + evidence_map.json + ChromaDB
  # Output:    knowledge/analyze/analyzed_architecture.json
  #
  # AGENTS:
  # 1. Technical Architect: Styles, patterns, tech stack, layers
  # 2. Functional Analyst: Domain model, capabilities, use cases
  # 3. Quality Analyst: Technical debt, risks, quality attributes
  # 4. Synthesis Lead: Merge all analyses into unified JSON
  # =========================================================================
  analyze:
    enabled: true
    name: "Analyze"
    description: "Multi-agent analysis of architecture facts"
    type: crew
    required: true
    order: 2
    dependencies: [extract]
    config:
      output_dir: "./knowledge/analyze"
      temperature: 0.2
      max_iterations: 15
      verbose: true

  # =========================================================================
  # CREW: Document - Architecture Synthesis (LLM, evidence-first)
  # =========================================================================
  # Type:      Crew (AI Agents)
  # Location:  crews/architecture_synthesis/
  # Input:     architecture_facts.json + analyzed_architecture.json + ChromaDB
  # Output:    knowledge/document/c4/
  #            knowledge/document/arc42/
  #            knowledge/document/runtime/
  #            knowledge/document/evidence/
  #
  # RULES:
  # - Only synthesize what is in architecture_facts.json
  # - Every statement must reference evidence
  # - If no evidence, mark as UNKNOWN
  # - No invented containers/components
  # =========================================================================
  document:
    enabled: true
    name: "Document"
    description: "AI synthesizes C4 and arc42 from architecture facts"
    type: crew
    required: false
    order: 3
    dependencies: [analyze]
    config:
      output_dir: "./knowledge/document"
      temperature: 0.2
      max_iterations: 15
      verbose: true

  # =========================================================================
  # CREW: Triage - Issue Triage (deterministic + LLM)
  # =========================================================================
  # Type:      Crew (deterministic scan + LLM synthesis)
  # Location:  crews/triage/crew.py → TriageCrew
  # Purpose:   Classify issues, find entry points, calculate blast radius,
  #            produce customer summary + developer brief
  # Input:     knowledge/extract/ (required) + knowledge/analyze/ (optional)
  # Output:    knowledge/triage/ (findings, customer.md, developer.md, triage.json)
  # =========================================================================
  triage:
    enabled: true
    name: "Triage"
    description: "Issue classification, blast radius, and dual-audience reports"
    type: hybrid
    required: false
    order: 4
    dependencies: [extract]
    config:
      output_dir: "./knowledge/triage"
      temperature: 0.2

  # =========================================================================
  # PIPELINE: Plan - Development Planning (HYBRID ARCHITECTURE)
  # =========================================================================
  # Type:      Pipeline (Hybrid: Deterministic + 1 LLM Call)
  # Location:  pipelines/development_planning/
  # Architecture:
  #   Stage 1: Input Parser (deterministic, <1s)
  #   Stage 2: Component Discovery (RAG + scoring, 2-5s)
  #   Stage 3: Pattern Matcher (TF-IDF + rules, 1-3s)
  #   Stage 4: Plan Generator (LLM call, 15-30s)
  #   Stage 5: Validator (Pydantic, <1s)
  #
  # Total Duration: 18-40 seconds (vs 5-7 minutes with CrewAI)
  # LLM Calls: 1 (vs 5 with CrewAI)
  # Success Rate: 95%+ (deterministic stages)
  #
  # Input:
  #   - inputs/tasks/ (JIRA XML, DOCX, Excel, logs, etc.)
  #   - architecture_facts.json (Extract, all 17 keys)
  #   - analyzed_architecture.json (Analyze)
  #   - ChromaDB (Discover, semantic search)
  #
  # Output: knowledge/plan/{task_id}_plan.json
  #   - affected_components (from ChromaDB RAG + scoring)
  #   - implementation_steps
  #   - test_strategy (from 925 test patterns, TF-IDF similarity)
  #   - security_considerations (from 143 security details)
  #   - validation_strategy (from 149 validation patterns)
  #   - error_handling (from 23 error patterns)
  #   - architecture_context (from analyzed_architecture.json)
  #   - risks, complexity estimate
  # =========================================================================
  plan:
    enabled: true
    name: "Plan"
    description: "Fast, evidence-based implementation plans using hybrid architecture"
    type: pipeline
    required: false
    order: 5
    dependencies: [analyze]
    config:
      output_dir: "./knowledge/plan"
      input_dirs:
        tasks: "./inputs/tasks"
        requirements: "./inputs/requirements"
        logs: "./inputs/logs"
        reference: "./inputs/reference"

  # =========================================================================
  # PIPELINE: Implement - Code Generation (HYBRID ARCHITECTURE)
  # =========================================================================
  # Type:      Pipeline (Hybrid: Deterministic + 1 LLM Call per file)
  # Location:  pipelines/code_generation/
  # Architecture:
  #   Stage 1: Plan Reader (deterministic, <1s)
  #   Stage 2: Context Collector (file I/O, 2-5s)
  #   Stage 3: Code Generator (LLM, 10-30s per file)
  #   Stage 4: Code Validator (deterministic, 1-3s)
  #   Stage 5: Output Writer (git + file I/O, 2-5s)
  #
  # Input:     knowledge/plan/{task_id}_plan.json (Plan phase)
  # Output:    Git branch codegen/{task_id} in target repo
  #            knowledge/implement/{task_id}_report.json
  # =========================================================================
  implement:
    enabled: true
    name: "Implement"
    description: "Generate code from plans using hybrid architecture"
    type: crew
    required: false
    order: 6
    dependencies: [plan]
    config:
      output_dir: "./knowledge/implement"

  # =========================================================================
  # CREW: Verify - Test Generation (PLANNED)
  # =========================================================================
  # Type:      Crew (AI Agents)
  # Location:  crews/test_generation/ (planned)
  # Purpose:   Generate tests matching existing test patterns
  # Tasks:     Unit tests, integration tests following 925 existing patterns
  # Input:     Generated code from Implement + test patterns
  # Output:    JUnit/Jest test files
  # =========================================================================
  verify:
    enabled: true
    name: "Verify"
    description: "Generate tests matching existing patterns"
    type: crew
    required: false
    order: 7
    dependencies: [implement]
    config:
      output_dir: "./knowledge/verify"

  # =========================================================================
  # CREW: Deliver - Review & Consistency Guard (IMPLEMENTED v0.6.2)
  # =========================================================================
  # Type:      Crew (deterministic scan + LLM synthesis)
  # Location:  crews/review/crew.py → ReviewCrew
  # Purpose:   Consistency check facts vs C4/arc42 docs + quality report
  # Tasks:     Container coverage, arc42 chapters, placeholder scan, score
  # Input:     knowledge/extract/ + knowledge/document/
  # Output:    knowledge/deliver/ (consistency.json, quality.json, synthesis-report.md)
  # =========================================================================
  deliver:
    enabled: true
    name: "Deliver"
    description: "Architecture consistency review and quality report"
    type: hybrid
    required: false
    order: 8
    dependencies: [implement]
    config:
      output_dir: "./knowledge/deliver"

# =============================================================================
# Execution Settings
# =============================================================================
execution:
  mode: "document"
  stop_on_error: true
  parallel_execution: false

# =============================================================================
# Quick Presets
# =============================================================================
presets:
  index:
    display_name: "Discover"
    description: "Index codebase into vector store (ChromaDB)"
    icon: "cloud_sync"
    phases:
      - discover

  scan:
    display_name: "Discover + Extract"
    description: "Deterministic architecture facts extraction (no LLM)"
    icon: "fact_check"
    phases:
      - discover
      - extract

  analyze:
    display_name: "Discover → Analyze"
    description: "AI-powered analysis of architecture patterns and quality"
    icon: "psychology"
    phases:
      - discover
      - extract
      - analyze

  document:
    display_name: "Discover → Document"
    description: "Generate full Arc42 & C4 architecture documentation"
    icon: "menu_book"
    phases:
      - discover
      - extract
      - analyze
      - document

  triage:
    display_name: "Discover → Triage"
    description: "Issue classification, blast radius, and dual-audience reports"
    icon: "troubleshoot"
    phases:
      - discover
      - extract
      - analyze
      - triage

  plan:
    display_name: "Discover → Plan"
    description: "Generate implementation plans from task descriptions"
    icon: "assignment"
    phases:
      - discover
      - extract
      - analyze
      - triage
      - plan

  develop:
    display_name: "Discover → Implement"
    description: "Generate code from plans (Planning & Code Gen)"
    icon: "code"
    phases:
      - discover
      - extract
      - analyze
      - triage
      - plan
      - implement

  architect:
    display_name: "Discover → Plan (no code)"
    description: "Full architecture docs & development planning"
    icon: "architecture"
    phases:
      - discover
      - extract
      - analyze
      - document
      - triage
      - plan

  full:
    display_name: "Full Pipeline"
    description: "All phases: Discover → Extract → Analyze → Document → Triage → Plan → Implement → Verify → Deliver"
    icon: "rocket_launch"
    phases:
      - discover
      - extract
      - analyze
      - document
      - triage
      - plan
      - implement
      - verify
      - deliver
