# =============================================================================
# AICodeGenCrew - SECURE Deployment
#
# For distribution to developers. No source code visible.
# All code is compiled to bytecode/minified JS.
#
# Usage:
#   ./build-secure.sh          # Build images
#   docker compose -f docker-compose.secure.yml up -d
# =============================================================================
version: "3.8"

services:
  backend:
    image: aicodegencrew-backend:${TAG:-latest}
    build:
      context: ..
      dockerfile: ui/backend/Dockerfile.secure
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    volumes:
      # ONLY data directories — NO source code mounted
      - knowledge_data:/app/knowledge
      - logs_data:/app/logs
      - config_data:/app/config
    environment:
      - TZ=${TZ:-Europe/Berlin}
      - AICODEGENCREW_ROOT=/app
      - DASHBOARD_CORS_ORIGINS=http://localhost:${FRONTEND_PORT:-80},http://localhost:4200
      - PYTHONPATH=/app/src:/app
      # LLM connection — developers set these
      - LLM_PROVIDER=${LLM_PROVIDER:-onprem}
      - MODEL=${MODEL:-}
      - API_BASE=${API_BASE:-}
    restart: unless-stopped

  frontend:
    image: aicodegencrew-frontend:${TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  knowledge_data:
  logs_data:
  config_data:
