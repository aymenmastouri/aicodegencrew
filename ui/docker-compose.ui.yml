version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ../knowledge:/app/knowledge
      - ../logs:/app/logs
      - ../src/aicodegencrew/config:/app/src/aicodegencrew/config:ro
      - ../src:/app/src:ro
      - ../.env:/app/.env
      - ../.env.example:/app/.env.example:ro
    environment:
      - AICODEGENCREW_ROOT=/app
      - DASHBOARD_CORS_ORIGINS=http://localhost:4200,http://localhost:80
      - PYTHONPATH=/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
