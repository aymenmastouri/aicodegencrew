services:
  backend:
    build:
      context: ..
      dockerfile: ui/backend/Dockerfile.dev
    ports:
      - "8001:8001"
    volumes:
      - ../knowledge:/app/knowledge
      - ../logs:/app/logs
      - ../inputs:/app/inputs
      - ../config:/app/config
      - ../.env:/app/.env
      - ../.env.example:/app/.env.example:ro
    environment:
      AICODEGENCREW_ROOT: /app
      DASHBOARD_CORS_ORIGINS: "http://localhost:4200,http://localhost,http://localhost:80"
      PYTHONPATH: /app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ..
      dockerfile: ui/frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
